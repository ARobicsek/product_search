name: Search (Scheduled)

# Scheduled cron is disabled for now — searches only run when manually
# triggered via the Run-now button (search-on-demand.yml) or the Actions
# UI. To re-enable hourly runs, uncomment the `schedule` block below.
on:
  workflow_dispatch:
  # schedule:
  #   # Run at minute 0 past every hour
  #   - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  scheduled-search:
    name: Hourly Scheduler Tick
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run scheduler tick
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          # Need eBay API credentials for Phase 2 eBay Browse API if configured
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: |
          python -m product_search.cli scheduler-tick

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update scheduled reports and data [skip ci]"
            git pull --rebase origin main
            git push
          fi
