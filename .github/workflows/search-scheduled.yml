name: Search (Scheduled)

# scheduler-tick decides per-profile whether a product is "due" (recurring
# cron occurrence in the look-back window, or a past-due one-time run_at).
#
# Phase 20 / ADR-052: the ON-TIME path is `workflow_dispatch`, fired every
# ~15 min by an external scheduler (cron-job.org → POST /api/cron/tick on the
# Vercel app → this dispatch). GitHub's own `schedule:` is best-effort and was
# measured collapsing to ~hourly (intervals [64,57,62,63] min on 2026-05-17),
# which is why a reliable external trigger is needed.
#
# The `schedule:` cron below is KEPT ON PURPOSE as a DEGRADED FALLBACK only:
# if cron-job.org or the Vercel route is ever down, scheduling degrades to
# "late" (~hourly) instead of "dead". It is NOT the primary trigger. Free on a
# public repo (unlimited Actions minutes); cost is Actions-history noise +
# occasional ~hourly delay when the fallback is what actually fires. See
# ADR-052 (supersedes the ADR-050 cron-delay caveat).
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

jobs:
  scheduled-search:
    name: Hourly Scheduler Tick
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run scheduler tick
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          # Need eBay API credentials for Phase 2 eBay Browse API if configured
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          ALTERLAB_API_KEY: ${{ secrets.ALTERLAB_API_KEY }}
          SCRAPPEY_API_KEY: ${{ secrets.SCRAPPEY_API_KEY }}
          # Without these two, notify.py early-returns and NO alert push is
          # ever sent (the alert still fires + disarms in the state machine).
          # PUSH_NOTIFY_SECRET must equal the same-named value in Vercel.
          WEB_URL: ${{ secrets.WEB_URL }}
          PUSH_NOTIFY_SECRET: ${{ secrets.PUSH_NOTIFY_SECRET }}
        run: |
          python -m product_search.cli scheduler-tick

      - name: Upload run diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-diagnostics-scheduled-${{ github.run_id }}
          path: |
            worker/data/filter_logs/
            worker/data/llm_traces/
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit and Push changes
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update scheduled reports and data [skip ci]"
            git pull --rebase origin main
            git push
          fi
