schema_version: 2
slug: focal-clear-mg
display_name: Focal Clear MG Headphones
description: >-
  Both Focal Clear MG and Clear MG Professional variants, any condition. Excludes accessory-only listings (ear pads,
  cables, cases, stands sold alone).
product_type: headphones
target:
  unit: count
  amount: 1
queries:
  - Focal Clear MG headphones
  - Focal Clear MG Professional
  - Focal Clear Magnesium
  - Focal Clear MG open-back
match:
  aliases:
    - Clear MG
    - Clear MG Professional
    - Clear Magnesium
  title_excludes:
    - ear pads only
    - earpads only
    - cable only
    - case only
    - stand only
    - accessories only
    - replacement ear pads
    - replacement cable
  variant_strict: false
filters:
  condition_in:
    - new
    - used
    - refurbished
    - open box
sources:
  serper:
    enabled: true
    gl: us
  ebay:
    enabled: true
  amazon:
    enabled: true
display:
  max_listings: 20
  per_vendor_cap: 3
  attrs:
    - price
    - condition
    - seller
    - seller_rating

alerts:
  - kind: price_below
    threshold_usd: 800
    mode: while_below
    price_basis: unit

schedule:
  cron: "5 14 * * *"
  timezone: UTC
