schema_version: 2
slug: ddr5-32gb-ecc-rdimm-server-ram
display_name: DDR5 32GB ECC Registered Server RAM (SK Hynix/Samsung/Micron/Kingston)
description: >-
  Four equivalent 32GB DDR5 ECC RDIMM server memory modules: SK Hynix HMCG84AGBRA191N, Samsung M321R4GA3BB6-CWM/-CWMK,
  Micron MTC20F1045S1RC56BD1, Kingston KSM56R46BD4PMI-32HAI. Any condition, any vendor.
product_type: ram
target:
  unit: count
  amount: 1
queries:
  - SK Hynix HMCG84AGBRA191N 32GB DDR5-5600 ECC RDIMM
  - Samsung M321R4GA3BB6-CWM 32GB DDR5 ECC Registered
  - Micron MTC20F1045S1RC56BD1 32GB DDR5-5600 ECC
  - Kingston KSM56R46BD4PMI-32HAI 32GB DDR5 Server
match:
  aliases:
    - HMCG84AGBRA191N
    - M321R4GA3BB6-CWM
    - M321R4GA3BB6-CWMK
    - MTC20F1045S1RC56BD1
    - KSM56R46BD4PMI-32HAI
  title_excludes:
    - 16GB
    - 64GB
    - 96GB
    - 128GB
    - UDIMM
    - SODIMM
    - unbuffered
    - non-ECC
    - DDR4
    - DDR3
  variant_strict: true
filters:
  condition_in:
    - new
    - used
    - refurbished
    - open box
sources:
  serper:
    enabled: true
    gl: us
  ebay:
    enabled: true
  amazon:
    enabled: true
display:
  max_listings: 20
  per_vendor_cap: 3
  attrs:
    - price
    - condition
    - seller
    - seller_rating
    - mpn

alerts:
  - kind: price_below
    threshold_usd: 815
    mode: while_below
    price_basis: unit

schedule:
  cron: "0 17 * * *"
  timezone: UTC
