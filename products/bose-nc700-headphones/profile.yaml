slug: "bose-nc700-headphones"
display_name: "Bose Noise Cancelling Headphones 700"
description: >
  Track cheapest listings for the discontinued Bose Noise Cancelling Headphones 700
target:
  unit: "count"
  amount: 1
  configurations:
    - { module_count: 1, module_capacity_gb: 1 }
spec_attrs:
  condition: { type: str, required: false, enum: ["new", "used", "refurbished"] }
spec_filters:
  - { rule: "in_stock" }
  - { rule: "single_sku_url" }
  - { rule: "title_excludes", values: ["case", "earbuds", "ear tips", "cable", "pad", "stand", "adapter"] }
spec_flags:
  - { rule: "ship_from_country_in", flag: "ships_far", values: ["CN", "HK"] }
  - { rule: "low_seller_feedback", flag: "low_feedback", rating_pct_below: 95.0, count_below: 100 }
  - { rule: "title_mentions", flag: "not_full_headphones", values: ["for parts", "not working", "defective", "read description"] }
sources:
  - id: "ebay_search"
    queries:
      - "Bose Noise Cancelling Headphones 700"
      - "Bose NC700 headphones"
      - "Bose 700 headphones used"
      - "Bose NCH700 headphones"
    max_results_per_query: 30
  - id: "universal_ai_search"
    url: "https://www.backmarket.com/en-us/search?q=bose+nc+700"
sources_pending: []
qvl_file: "products/bose-nc700-headphones/qvl.yaml"
brand_candidates:
  - Bose
synthesis_hints:
  - >
    The Bose NC700 is discontinued; prioritize listings that confirm the full headphone unit (not just accessories or parts).
  - >
    Refurbished units from reputable sellers often offer the best value; weigh seller feedback heavily.
report_columns:
  - rank
  - source
  - title
  - price_unit
  - total_for_target
  - condition
  - brand
  - seller
  - seller_rating
  - ship_from
  - flags
schedule:
  cron: "0 8 * * *"
  timezone: "UTC"
