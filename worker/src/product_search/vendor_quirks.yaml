# Vendor quirks registry — SINGLE SOURCE OF TRUTH for per-vendor knowledge.
#
# Why this file exists (ADR-068): vendor-specific knowledge (URL transforms,
# default alterlab_options, known failures, AlterLab-known-good status) used to
# live in three uncoordinated places — the onboarder prompt, per-profile YAML
# patches, and web/lib/onboard/probe-url.ts. Knowledge learned by patching one
# profile (e.g. Best Buy `&intl=nosplash` in e93fd47) never made it back into
# the system, so the next onboarding repeated the same mistake. This registry
# is the one place it lives now.
#
# Consumed by:
#   - worker/.../adapters/universal_ai.py
#       → merges `default_alterlab_options` under source-level options
#       → applies `url_transforms` before fetch
#       → logs every applied transform for debug
#   - web/lib/onboard/vendor-quirks-data.ts  (generated at build time)
#       → enforces `force_detail_backup` (ADR-067) at save time (soft warning)
#       → drives the probe-url AlterLab-known-good allowlist
#   - web/lib/onboard/promptText.ts  (generated at build time)
#       → rendered vendor knowledge replaces the hand-authored list in the
#         onboarder prompt so prompt and adapter never drift apart.
#
# Hosts are keyed WITHOUT the `www.` prefix; the loader strips it before
# lookup. Add/edit entries when you learn a vendor-level fact — do NOT patch a
# per-product profile.yaml instead (that's the drift this registry exists to
# prevent — see SESSION_PROTOCOL.md).

# --- Schema (per host) ----------------------------------------------------
#
# default_alterlab_options:        # merged under source-level extra.alterlab_options
#   country: <str>                 # e.g. "us"
#   min_tier: <int>                # 1..4 (4 = Playwright browser; beats challenges tier 3 can't)
#   wait_condition: <str>          # domcontentloaded | networkidle | load
#                                  # (waits for JS/network to settle before
#                                  #  capturing HTML — use networkidle for
#                                  #  async-rendered prices). ADR-071.
#   # NOTE: the legacy `wait_for: <int>` field is a BUG — AlterLab has no such
#   # param, so sending it forces the request into an async 202 job that never
#   # resolves => body 0 (the B&H/Target body-0 failures). It is auto-migrated
#   # to `wait_condition: networkidle` by normalize_alterlab_options (ADR-071);
#   # do not add new `wait_for` entries.
#
# url_transforms:                  # ordered list, evaluated top-to-bottom
#   - when:                        # all conditions must match; omit `when` to apply unconditionally
#       path_prefix: <str>         # URL path startswith
#       path_includes: <str>       # URL path contains
#       query_includes:            # all given query params must match exactly
#         <key>: <value>
#     append_query:                # add ?k=v ONLY if k not already present
#       <key>: <value>
#     reason: |                    # free-text, surfaces in adapter logs
#       Why this transform exists. Cite the commit/incident.
#
# force_detail_backup: true        # ADR-067: single-SKU products on this vendor
#                                  # MUST have BOTH a search URL AND a
#                                  # page_type:"detail" URL. Save-time soft
#                                  # warning when violated.
#
# alterlab_known_good: true        # probe-url.ts: bare datacenter fetch may
#                                  # fail (5xx, tiny body) but production
#                                  # AlterLab handles it. Don't demote on probe.
#
# prefer_page_type: detail         # Onboarder hint: this vendor's search-tile
#                                  # walker is unreliable; prefer detail URLs
#                                  # via Tier 1.5 extractor.
#
# known_failure:                   # Vendor is currently broken; onboarder
#                                  # should put URLs in sources_pending.
#   severity: blocker | warning
#   summary: |                     # what's wrong
#   onboarder_action: |            # what the onboarder should do instead
#
# notes: |                         # free-text rendered into onboarder prompt

# --- Entries (alphabetical by host) ----------------------------------------

adorama.com:
  force_detail_backup: true

amazon.com:
  default_alterlab_options:
    country: us
    min_tier: 3
    wait_condition: networkidle
  alterlab_known_good: true
  notes: |
    Amazon search + detail are JS-rendered: a bare datacenter fetch (or even
    AlterLab without `wait_condition: networkidle`) returns a 1+ MB body with
    ZERO product-shaped anchors — the tiles aren't in static HTML. Phase 23
    Part A onboarded a profile WITHOUT these defaults and got
    `fetched 0 / passed 0` on both Amazon sources (commit a1f98dc). The probe
    at tier 3 + networkidle returns 1.4 MB and 42 anchor candidates with the
    target product present. Phase 24 / ADR-082.

backmarket.com:
  default_alterlab_options:
    country: us
    min_tier: 3
    wait_condition: networkidle
  alterlab_known_good: true
  notes: |
    Same JS-rendered shape as Amazon: bare datacenter fetch returns ~900 KB
    with 0 JSON-LD and 0 product-shaped anchors (78 anchors are nav chrome).
    Phase 24 / ADR-082 adds tier 3 + networkidle defaults so the runtime can
    extract products; a transient probe on 2026-05-24 also surfaced a
    Cloudflare "Just a moment..." challenge through AlterLab — ADR-078's
    circuit breaker absorbs that if it persists. Detail URLs still recommended
    as backup.

bestbuy.com:
  default_alterlab_options:
    country: us
    min_tier: 3
  url_transforms:
    - when:
        path_prefix: /site/searchpage.jsp
      append_query:
        intl: nosplash
      reason: |
        Best Buy serves a country-selector splash on first visit even when
        AlterLab is already routing through country:us. The intl=nosplash
        query param skips it. Discovered 2026-05-20 (commit e93fd47): body
        went 7 KB -> 1.6 MB, anchor candidates 0 -> 12. Without this, fresh
        onboardings get HTTP/2 protocol errors and zero listings.
  force_detail_backup: true
  alterlab_known_good: true

bhphotovideo.com:
  default_alterlab_options:
    country: us
    min_tier: 3
    wait_condition: networkidle
  prefer_page_type: detail
  force_detail_backup: true
  notes: |
    B&H SEARCH is Cloudflare bot-walled — not recoverable today (ADR-087,
    re-verified 2026-05-25). Every render rung (tier 3 AND tier 4 browser, both
    networkidle AND domcontentloaded) returned the SAME 31.7 KB "Performing
    security verification" Cloudflare interstitial (Ray ID, cf-* markers), never
    the product grid. Same failure class as microcenter. Earlier captures that
    DID partially render still leaked tiles to the static walker (a 200 KB page,
    24 product mentions, yielded only 4 anchors). Recall therefore comes from
    direct product-detail URLs with page_type:"detail" — the Tier 1.5 detail
    extractor reads B&H detail pages reliably. Do NOT mark known_failure: detail
    works; only search is walled.

centralcomputer.com:
  default_alterlab_options:
    country: us
    min_tier: 3
    wait_condition: networkidle
  known_failure:
    severity: blocker
    summary: |
      Cloudflare bot-walled — same class as microcenter (ADR-088, probed
      2026-05-25). Search AND homepage return the SAME ~31.9 KB
      "Just a moment..." Cloudflare interstitial (Ray ID, cf-* markers, 0
      product anchors) through AlterLab at tier 3 + networkidle. The
      2026-05-17 detail-page capture was already the identical challenge body
      (pinned barren by test_strip_real_botwall_fixture). Detail URLs do NOT
      escape it either — there is no working path today. NOTE: this host was
      previously (mis)tagged `alterlab_known_good: true`; that asserted AlterLab
      renders it fine, which is false. Removed — a Cloudflare-walled host is the
      opposite of known-good. default_alterlab_options kept to document the
      max attempt and so the runtime sends the right options IF the wall lifts.
    onboarder_action: |
      Put centralcomputer.com URLs in `sources_pending` (NOT `sources`) with
      this summary as the note. Do not promise the user CentralComputer
      listings until the Cloudflare bypass is solved.

costco.com:
  force_detail_backup: true

crutchfield.com:
  force_detail_backup: true

ebay.com:
  alterlab_known_good: true
  dedicated_adapter: ebay_search
  notes: |
    eBay recall is owned by the dedicated `ebay_search` adapter (adapters/ebay.py,
    its own fetch path + eBay-specific parsing) — the onboarder always routes
    eBay there, NEVER to universal_ai_search (onboard_v1.txt). So this host does
    NOT take `default_alterlab_options`: those only feed the universal_ai render
    path, which the onboarder never points at eBay. ADR-088 (probed 2026-05-25)
    confirmed render defaults would be the WRONG lever anyway: a default-tier
    AlterLab fetch of an eBay search URL returns a ~450-byte stub, and even a
    tier-3 + networkidle render returns titles/anchors but ZERO listing prices
    (eBay loads prices via late JS the capture never hydrates) — so the
    anti-fabrication price guard drops every candidate. `alterlab_known_good`
    is kept only so probe-url.ts won't hard-demote a manually-pasted eBay URL on
    a bare-fetch bot-block. `dedicated_adapter` exempts eBay from the ADR-082
    render-defaults lint (the lint's premise doesn't apply to adapter-owned
    hosts — ADR-088).

gamestop.com:
  force_detail_backup: true

homedepot.com:
  force_detail_backup: true

lowes.com:
  force_detail_backup: true

macys.com:
  force_detail_backup: true

newegg.com:
  default_alterlab_options:
    wait_condition: networkidle
  force_detail_backup: true
  notes: |
    Newegg renders pricing asynchronously via JS — give it wait time before
    extracting (wait_condition: networkidle). No adapter yet for a dedicated
    Newegg source; route via universal_ai_search. Search recall WORKS once the
    page renders: a 2026-05-25 networkidle capture (ADR-087) carried ~20 real
    product tiles and BOTH the anchor-walker and ADR-077 full-HTML tiers
    recovered the target product. The Phase 26 Defect 6 "820 KB → 0 listings"
    was a transient render miss (degraded AlterLab returned an un-hydrated
    body), not a parser gap. Regression-guarded by newegg_search_mx_master_3s.

microcenter.com:
  default_alterlab_options:
    country: us
    min_tier: 3
    wait_condition: networkidle
  known_failure:
    severity: blocker
    summary: |
      Cloudflare challenge served even at min_tier:3. Bumping to min_tier:4
      produces silent AlterLab failure (body_len=0). No working path today —
      this is a vendor-level outage waiting on AlterLab tier investigation.
      Re-verified 2026-05-25 (Phase 27 D3, see docs/microcenter_reprobe_2026_05_25.md):
      3 distinct detail URLs (CPU, SSD, motherboard) all returned 0 priced
      products through AlterLab at the registry defaults — either a 39-char
      stub or ~32 KB Cloudflare challenge body. The Phase 26 stress26-mc
      success was a single cache-hit outlier, NOT a recovery; keep this
      block at `blocker` until the underlying bypass is solved.
    onboarder_action: |
      Put microcenter.com URLs in `sources_pending` (NOT `sources`) with this
      summary as the note. Do not promise the user microcenter listings until
      this is resolved.

rei.com:
  force_detail_backup: true

serversupply.com:
  default_alterlab_options:
    country: us
    min_tier: 3
    wait_condition: networkidle
  known_failure:
    severity: blocker
    summary: |
      Cloudflare bot-walled — same class as microcenter (ADR-088, probed
      2026-05-25). The homepage returns a ~31.7 KB "Just a moment... /
      Performing security verification" Cloudflare interstitial (Ray ID, 0
      product anchors) through AlterLab at tier 3 + networkidle. The 2026-05-17
      detail-page capture was the identical challenge body (pinned barren by
      test_strip_real_botwall_fixture). No working path today. NOTE: previously
      (mis)tagged `alterlab_known_good: true` — false for a Cloudflare-walled
      host; removed. default_alterlab_options kept to document the max attempt.
    onboarder_action: |
      Put serversupply.com URLs in `sources_pending` (NOT `sources`) with this
      summary as the note. Do not promise the user ServerSupply listings until
      the Cloudflare bypass is solved.

sweetwater.com:
