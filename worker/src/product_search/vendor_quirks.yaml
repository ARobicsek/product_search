costco.com:
  force_detail_backup: true

crutchfield.com:
  force_detail_backup: true

ebay.com:
  alterlab_known_good: true
  dedicated_adapter: ebay_search
  notes: |
    eBay recall is owned by the dedicated `ebay_search` adapter (adapters/ebay.py,
    its own fetch path + eBay-specific parsing) — the onboarder always routes
    eBay there, NEVER to universal_ai_search (onboard_v1.txt). So this host does
    NOT take `default_alterlab_options`: those only feed the universal_ai render
    path, which the onboarder never points at eBay. ADR-088 (probed 2026-05-25)
    confirmed render defaults would be the WRONG lever anyway: a default-tier
    AlterLab fetch of an eBay search URL returns a ~450-byte stub, and even a
    tier-3 + networkidle render returns titles/anchors but ZERO listing prices
    (eBay loads prices via late JS the capture never hydrates) — so the
    anti-fabrication price guard drops every candidate. `alterlab_known_good`
    is kept only so probe-url.ts won't hard-demote a manually-pasted eBay URL on
    a bare-fetch bot-block. `dedicated_adapter` exempts eBay from the ADR-082
    render-defaults lint (the lint's premise doesn't apply to adapter-owned
    hosts — ADR-088).

gamestop.com:
  force_detail_backup: true

homedepot.com:
  force_detail_backup: true

lowes.com:
  force_detail_backup: true

macys.com:
  force_detail_backup: true

newegg.com:
  default_alterlab_options:
    wait_condition: networkidle
  force_detail_backup: true
  notes: |
    Newegg renders pricing asynchronously via JS — give it wait time before
    extracting (wait_condition: networkidle). No adapter yet for a dedicated
    Newegg source; route via universal_ai_search. Search recall WORKS once the
    page renders: a 2026-05-25 networkidle capture (ADR-087) carried ~20 real
    product tiles and BOTH the anchor-walker and ADR-077 full-HTML tiers
    recovered the target product. The Phase 26 Defect 6 "820 KB → 0 listings"
    was a transient render miss (degraded AlterLab returned an un-hydrated
    body), not a parser gap. Regression-guarded by newegg_search_mx_master_3s.

microcenter.com:
  default_alterlab_options:
    country: us
    min_tier: 3
    wait_condition: networkidle
    skip_alterlab: true
