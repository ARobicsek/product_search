target.com:
  default_alterlab_options:
    country: us
    min_tier: 3
  force_detail_backup: true
  alterlab_known_good: true
  notes: |
    Target search results are non-deterministic: the same `target.com/s/...`
    URL surfaces the user's exact product on one run and only refurbished/
    unrelated variants on the next (sony-wh-1000xm5 hit this 2026-05-20 —
    43/1 vs 37/0 on same-day runs of the same URL). ADR-067 detail-URL
    backup is essential for any single-SKU Target product.

